services:
  - type: web
    name: odayam
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_URL
        fromService:
          type: web
          name: odayam
          property: host
      - key: MONGODB_URI
        sync: false        # set manually in Render dashboard
      - key: MONGODB_DB
        value: Odayam
      - key: TRANZAK_APP_ID
        sync: false
      - key: TRANZAK_APP_KEY
        sync: false
      - key: TRANZAK_ENV
        value: production
