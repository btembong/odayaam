<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odayam Restaurant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="header-avatar">O</div>
        <div>
          <div class="header-name">Odayam Restaurant</div>
          <div class="header-sub" id="header-sub">Online ordering</div>
        </div>
      </div>
      <div class="header-dot" id="header-dot" title="Connected"></div>
    </header>

    <!-- Messages -->
    <main class="messages" id="messages" role="log" aria-live="polite"></main>

    <!-- Payment banner (hidden by default) -->
    <div class="payment-banner" id="payment-banner" hidden>
      <span id="payment-banner-text"></span>
      <button class="banner-close" id="banner-close" aria-label="Dismiss">&times;</button>
    </div>

    <!-- Input area -->
    <footer class="footer">
      <div class="quick-replies" id="quick-replies"></div>
      <div class="input-row">
        <input
          type="text"
          id="text-input"
          placeholder="Type a number or message…"
          autocomplete="off"
          inputmode="text"
        />
        <button id="send-btn" aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
